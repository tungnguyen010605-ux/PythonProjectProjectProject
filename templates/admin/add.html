<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>Thêm Giảng viên</title>
</head>
<body>
    <div class="container" style="max-width: 600px; background: white; padding: 30px; border-radius: 8px; margin-top: 30px;">
        <h1>Thêm Giảng viên mới</h1>
        <form action="{{ url_for('add') }}" method="POST">
            <label>Họ và Tên:</label>
            <input type="text" name="name" required>

            <label>Học hàm/Học vị (TS, ThS):</label>
            <input type="text" name="title">

            <label>Chức vụ:</label>
            <input type="text" name="position">

            <label>Email:</label>
            <input type="email" name="email" required>

            <label>Số điện thoại:</label>
            <input type="text" name="phone">

            <div style="margin-top: 20px;">
                <button type="submit" style="background-color: #28a745;">Lưu lại</button>
                <a href="/" style="margin-left: 15px; color: #666; text-decoration: none;">Hủy bỏ</a>
            </div>
        </form>
    </div>
</body>
</html>
