<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 100px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h1 style="text-align: center;">Đăng nhập Admin</h1>
        <form method="POST">
            <label>Tài khoản:</label>
            <input type="text" name="username" placeholder="Username" required>

            <label>Mật khẩu:</label>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit" style="width: 100%; margin-top: 20px;">Đăng nhập</button>
        </form>
        <p style="text-align: center; margin-top: 15px;"><a href="/" style="text-decoration: none; color: #666;">← Quay lại trang chủ</a></p>
    </div>
</body>
</html>
