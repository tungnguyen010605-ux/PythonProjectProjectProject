<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>Chỉnh sửa Giảng viên</title>
</head>
<body>
    <div class="container" style="max-width: 600px; background: white; padding: 30px; border-radius: 8px; margin-top: 30px;">
        <h1>Chỉnh sửa thông tin</h1>
        <form action="{{ url_for('edit', id=lecturer['lecturer_id']) }}" method="POST">
            <label>Họ và Tên:</label>
            <input type="text" name="name" value="{{ lecturer['name'] }}" required>

            <label>Học hàm/Học vị:</label>
            <input type="text" name="title" value="{{ lecturer['title'] }}">

            <label>Chức vụ:</label>
            <input type="text" name="position" value="{{ lecturer['position'] }}">

            <div style="margin-top: 20px;">
                <button type="submit">Cập nhật</button>
                <a href="/" style="margin-left: 15px; color: #666; text-decoration: none;">Hủy bỏ</a>
            </div>
        </form>
    </div>
</body>
</html>
